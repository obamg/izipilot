services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: izipilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: izipilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U izipilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://izipilot:${POSTGRES_PASSWORD}@db:5432/izipilot
      NEXTAUTH_URL: https://${DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - web

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - web

  cron:
    image: alpine:3.19
    restart: always
    environment:
      CRON_SECRET: ${CRON_SECRET}
    volumes:
      - ./cron/crontab:/etc/crontabs/root:ro
      - ./cron/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      - app
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
